# Reverse-forward the local HTTPS server to an SSH-accessible host.
SSH_HOST=ssh.example.internal
SSH_USER=fleet-tunnel
SSH_IDENTITY=/var/lib/antminer-fleet/.ssh/host_forward
SSH_KNOWN_HOSTS=/var/lib/antminer-fleet/.ssh/known_hosts

REMOTE_BIND=127.0.0.1
REMOTE_PORT=8443
LOCAL_HOST=127.0.0.1
LOCAL_PORT=8443
RETRY_SECONDS=5
