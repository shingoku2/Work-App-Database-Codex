# Example sshd policy for the Antminer Fleet desktop client tunnel account.
# Install on the SSH host that users connect to, then run:
#   sudo sshd -t
#   sudo systemctl reload ssh
#
# This assumes the package postinst created:
#   user: antminer-fleet-client-tunnel
#   authorized keys: /etc/antminer-fleet/client-tunnel/authorized_keys
#
# Public keys should be added with:
#   sudo /usr/lib/antminer-fleet-server/authorize-client-tunnel-key.sh \
#     --label USER_OR_ASSET_TAG \
#     --public-key-file /path/to/id_ed25519.pub

Match User antminer-fleet-client-tunnel
    AuthenticationMethods publickey
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    PubkeyAuthentication yes
    AuthorizedKeysFile /etc/antminer-fleet/client-tunnel/authorized_keys
    AllowTcpForwarding local
    PermitOpen 127.0.0.1:8443
    X11Forwarding no
    AllowAgentForwarding no
    PermitTTY no
    PermitTunnel no
    GatewayPorts no
